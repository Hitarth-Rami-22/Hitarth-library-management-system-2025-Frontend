<div class="table-container">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th *ngFor="let header of headers">{{ header }}</th>
                </tr>
            </thead>
            <tbody>
                <ng-content select="tr"></ng-content>
                <tr *ngIf="loading">
                    <td [attr.colspan]="headers.length" class="loading-cell">
                        <div class="loader"></div>
                    </td>
                </tr>
                <tr *ngIf="!loading && !headers.length">
                    <td class="empty-cell" [attr.colspan]="headers.length">
                        <div class="empty-state">
                            {{ emptyMessage }}
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
