<div class="page-wrap">
    <app-page-header title="Request History"
        subtitle="Monitor the status of your borrow requests and view your library borrowing timeline.">
    </app-page-header>

    <div class="filter-tabs">
        <button class="tab-btn" [class.active]="activeFilter === null" (click)="setFilter(null)">All
            Requests</button>
        <button class="tab-btn" [class.active]="activeFilter === 0" (click)="setFilter(0)">Pending</button>
        <button class="tab-btn" [class.active]="activeFilter === 1" (click)="setFilter(1)">Approved</button>
        <button class="tab-btn" [class.active]="activeFilter === 2" (click)="setFilter(2)">Rejected</button>
        <button class="tab-btn" [class.active]="activeFilter === 4" (click)="setFilter(4)">Returns</button>
    </div>

    <div class="content-body">
        <app-data-table [headers]="['Activity', 'Book', 'Status', 'Date']" [loading]="isLoading"
            [emptyMessage]="'No requests found for the selected filter.'">

            <tr *ngFor="let r of filteredRequests">
                <td>
                    <div class="activity-type">
                        <span class="type-ic" [style.background-color]="getAccentColor(r.id)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                            </svg>
                        </span>
                        <span class="type-name">Borrow Request</span>
                    </div>
                </td>
                <td>
                    <div class="book-cell">
                        <strong>{{ r.book?.title }}</strong>
                        <span class="author">by {{ r.book?.author }}</span>
                    </div>
                </td>
                <td data-label="Status">
                    <app-status-badge [label]="getStatusLabel(r.status)"
                        [type]="getStatusType(r.status)"></app-status-badge>
                </td>
                <td data-label="Date">
                    <span class="date-text">{{ r.requestedOn | date:'mediumDate' }}</span>
                </td>
            </tr>
        </app-data-table>
    </div>
</div>
