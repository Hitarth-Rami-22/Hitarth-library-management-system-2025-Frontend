<div class="lib-wrap">

  <!-- ── Mobile Top Bar ── -->
  <header class="mobile-bar">
    <div class="mobile-brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </div>
      <span class="brand-name">LibraryMS</span>
    </div>
    <button class="burger" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ── Overlay (mobile) ── -->
  <div class="overlay" *ngIf="menuOpen" (click)="closeMenu()"></div>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" [class.open]="menuOpen">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">LibraryMS</span>
        <span class="brand-role">Librarian Portal</span>
      </div>
    </div>

    <!-- User chip -->
    <div class="user-chip">
      <div class="uc-avatar">{{ librarianName.charAt(0).toUpperCase() }}</div>
      <div class="uc-info">
        <span class="uc-name">{{ librarianName }}</span>
        <span class="uc-role">Librarian</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <ul>
        <li>
          <a routerLink="/librarian-dashboard/dashboard" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
              </svg>
            </span>
            <span class="nav-label">Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="/librarian-dashboard/books" routerLinkActive="active" (click)="closeMenu()">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              </svg>
            </span>
            <span class="nav-label">Manage Books</span>
          </a>
        </li>
      </ul>

      <span class="nav-section-label">Requests</span>
      <ul>
        <li>
          <a routerLink="/librarian-dashboard/requests" routerLinkActive="active" (click)="closeMenu()">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />
                <path
                  d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
              </svg>
            </span>
            <span class="nav-label">Borrow Requests</span>
          </a>
        </li>
        <li>
          <a routerLink="/librarian-dashboard/return-approvals" routerLinkActive="active" (click)="closeMenu()">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 11 12 14 22 4" />
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
              </svg>
            </span>
            <span class="nav-label">Return Approvals</span>
          </a>
        </li>
        <li>
          <a routerLink="/librarian-dashboard/penalties" routerLinkActive="active" (click)="closeMenu()">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </span>
            <span class="nav-label">View Penalties</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer / Logout -->
    <div class="sidebar-footer">
      <div class="sidebar-divider"></div>
      <button (click)="logout()" class="logout-btn">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </span>
        <span class="nav-label">Logout</span>
      </button>
    </div>

  </aside>

  <!-- ── Main Content ── -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

</div>
