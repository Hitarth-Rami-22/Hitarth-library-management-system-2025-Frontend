<div class="admin-wrap">

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </div>
      <div>
        <span class="brand-name">LMS Admin</span>
        <span class="brand-sub">Control Panel</span>
      </div>
    </div>

    <div class="user-chip">
      <div class="chip-avatar">{{ adminName.charAt(0).toUpperCase() }}</div>
      <div>
        <span class="chip-name">{{ adminName }}</span>
        <span class="chip-role">Administrator</span>
      </div>
    </div>

    <div class="nav-section">
      <span class="nav-label">Main Menu</span>
      <ul>
        <li>
          <a class="nav-item" routerLink="/dashboard" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact:true}">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
              </svg></span>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a class="nav-item" routerLink="/dashboard/users" routerLinkActive="active" (click)="closeMenu()">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
              </svg></span>
            <span>Manage Users</span>
          </a>
        </li>
        <li>
          <a class="nav-item" routerLink="/dashboard/books" routerLinkActive="active">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              </svg></span>
            <span>Manage Books</span>
          </a>
        </li>
        <li>
          <a class="nav-item" routerLink="/dashboard/requests" routerLinkActive="active">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />
                <path
                  d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
              </svg></span>
            <span>Borrow Requests</span>
            <span class="nav-badge warn" *ngIf="pendingBorrows > 0">{{ pendingBorrows }}</span>
          </a>
        </li>
        <li>
          <a class="nav-item" routerLink="/dashboard/return-approvals" routerLinkActive="active">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="9 11 12 14 22 4" />
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
              </svg></span>
            <span>Return Approvals</span>
          </a>
        </li>
        <li>
          <a class="nav-item" routerLink="/dashboard/penalties" routerLinkActive="active">
            <span class="nav-ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg></span>
            <span>Penalties</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ═══ Main Content (child pages rendered here) ═══ -->
  <main class="main">
    <router-outlet></router-outlet>
  </main>

</div>
